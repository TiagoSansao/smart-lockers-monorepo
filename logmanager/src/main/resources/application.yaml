spring:
  application:
    name: logManager

  datasource:
    url: jdbc:h2:file:./data/logmanager-db
    driverClassName: org.h2.Driver
    username: sa
    password: password

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

  spring:
    h2:
      console:
        enabled: true
        path: h2-console

server:
  port: 8083
