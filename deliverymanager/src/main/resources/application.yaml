spring:
  application:
    name: deliveryManager

  datasource:
    url: jdbc:h2:file:./data/deliverymanager-db
    driverClassName: org.h2.Driver
    username: sa
    password: password

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

  spring:
    h2:
      console:
        enabled: true
        path: h2-console

integration:
  lockermanager:
    baseUrl: http://localhost:8080

server:
  port: 8082