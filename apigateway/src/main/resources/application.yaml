spring:
  application:
    name: apiGateway
  cloud:
    gateway:
      routes:
        - id: delivery-manager
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/delivery/**
        
        - id: locker-manager-locker
          uri: http://localhost:8080
          predicates:
            - Path=/locker/**

        - id: log-manager
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/log/**
        
        - id: residents-manager
          uri: http://localhost:8081
          predicates:
            - Path=/resident/**
        
        - id: locker-embedded-system-open
          uri: http://localhost:8084
          predicates:
            - Path=/lockerShelf/{lockerShelfId}/open
            - Method=POST
        
        - id: locker-manager-shelf
          uri: http://localhost:8080
          predicates:
            - Path=/lockerShelf/**

server:
  port: 8085

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    com.smartlockers.apiGateway: DEBUG
